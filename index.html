<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVEWS Telemetry Dashboard</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-main: #f0f4f8;
            --text-muted: #9aa8b6;
            --primary: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--primary); }
        .timestamp { color: var(--text-muted); font-size: 0.9rem; }

        /* Dashboard Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* Large Data Numbers */
        .huge-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .unit { font-size: 1.2rem; color: var(--text-muted); font-weight: normal; }

        /* Visual Gauge / Progress Bar Styling */
        .gauge-container {
            background-color: #2d2d34;
            border-radius: 6px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 8px;
        }

        .gauge-bar {
            background-color: var(--primary);
            height: 100%;
            width: 0%; /* Dynamic allocation via JavaScript */
            transition: width 0.5s ease-in-out, background-color 0.3s;
        }

        /* Status Grid Items for Switches (Wells/Pumps) */
        .status-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .status-item {
            background-color: #2d2d34;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.active { background-color: #166534; color: #4ade80; }
        .badge.idle { background-color: #3f3f46; color: #d4d4d8; }
        .badge.tripped { background-color: #991b1b; color: #f87171; }
        .badge.clear { background-color: #166534; color: #4ade80; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>CVEWS Telemetry Node</h1>
            <div id="system-state-badge" class="badge idle" style="display:inline-block; margin-top:5px; font-size:0.9rem;">LOADING SYSTEM STATE...</div>
        </div>
        <div class="timestamp">Last Update: <span id="time-label">--/-- --:--:--</span></div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">Small Tank Level</div>
            <div class="huge-value"><span id="val-tk-sm">0</span> <span class="unit">/ 5000 Gal</span></div>
            <div class="gauge-container">
                <div id="gauge-tk-sm" class="gauge-bar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Large Tank Level</div>
            <div class="huge-value"><span id="val-tk-lg">0</span> <span class="unit">/ 15000 Gal</span></div>
            <div class="gauge-container">
                <div id="gauge-tk-lg" class="gauge-bar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">System Flow Rate</div>
            <div class="huge-value"><span id="val-flow">0.0</span> <span class="unit">GPM</span></div>
            <div class="gauge-container">
                <div id="gauge-flow" class="gauge-bar" style="background-color: #a855f7;"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Chlorine Residual</div>
            <div class="huge-value"><span id="val-cl2">0.00</span> <span class="unit">PPM</span></div>
            <div class="gauge-container">
                <div id="gauge-cl2" class="gauge-bar" style="background-color: #eab308;"></div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">Well Plant Control Status</div>
            <div class="status-list">
                <div class="status-item"><span>Well 1</span> <span id="state-w1" class="badge idle">OFF</span></div>
                <div class="status-item"><span>Well 3</span> <span id="state-w3" class="badge idle">OFF</span></div>
                <div class="status-item"><span>Well 4</span> <span id="state-w4" class="badge idle">OFF</span></div>
                <div class="status-item"><span>Well 5</span> <span id="state-w5" class="badge idle">OFF</span></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Booster Pump Status</div>
            <div class="status-list">
                <div class="status-item"><span>Pump 1</span> <span id="state-p1" class="badge idle">OFF</span></div>
                <div class="status-item"><span>Pump 2</span> <span id="state-p2" class="badge idle">OFF</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🛠️ CONFIGURATION: Paste your Google Web App URL endpoint here to read the raw data row
    const DATA_API_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

    // Tank Total Volumes for Calculating Percentages accurately
    const MAX_SMALL_TANK = 5000;
    const MAX_LARGE_TANK = 15000;
    const MAX_FLOW_SCALE = 100; // Max GPM for visual bar max mapping
    const MAX_CL2_SCALE  = 5.0; // Max Chlorine PPM for visual bar max mapping

    async function fetchLatestTelemetry() {
        try {
            const response = await fetch(DATA_API_URL);
            const data = await response.json();
            
            // Assuming your backend API sends back an array or object containing the latest columns
            updateDashboard(data);
        } catch (error) {
            console.error("Failed parsing real-time instrumentation payload:", error);
        }
    }

    function updateDashboard(data) {
        // Update Timestamps
        document.getElementById('time-label').innerText = data.timestamp || "Just Now";

        // Update Numbers
        document.getElementById('val-tk-sm').innerText = data.tk_sm;
        document.getElementById('val-tk-lg').innerText = data.tk_lg;
        document.getElementById('val-flow').innerText = parseFloat(data.flow).toFixed(1);
        document.getElementById('val-cl2').innerText = parseFloat(data.cl2).toFixed(2);

        // Update Gauge Bars (Percentages)
        const pctSm = Math.min((data.tk_sm / MAX_SMALL_TANK) * 100, 100);
        const pctLg = Math.min((data.tk_lg / MAX_LARGE_TANK) * 100, 100);
        const pctFlow = Math.min((data.flow / MAX_FLOW_SCALE) * 100, 100);
        const pctCl2 = Math.min((data.cl2 / MAX_CL2_SCALE) * 100, 100);

        document.getElementById('gauge-tk-sm').style.width = pctSm + "%";
        document.getElementById('gauge-tk-lg').style.width = pctLg + "%";
        document.getElementById('gauge-flow').style.width = pctFlow + "%";
        document.getElementById('gauge-cl2').style.width = pctCl2 + "%";

        // Dynamic Color Changes based on tank critical emptiness (less than 20%)
        document.getElementById('gauge-tk-sm').style.backgroundColor = pctSm < 20 ? '#f87171' : '#38bdf8';
        document.getElementById('gauge-tk-lg').style.backgroundColor = pctLg < 20 ? '#f87171' : '#38bdf8';

        // Master Alarm State Indicator Banner Top Left
        const alarmBadge = document.getElementById('system-state-badge');
        if (data.alm === "TRIPPED") {
            alarmBadge.innerText = "🚨 SYSTEM TRIPPED ALARM";
            alarmBadge.className = "badge tripped";
        } else {
            alarmBadge.innerText = "✅ SYSTEM OPERATIONAL";
            alarmBadge.className = "badge clear";
        }

        // Digital Grid Mappings Helper function (Switches to ON/OFF states)
        const setToggleState = (elementId, value) => {
            const el = document.getElementById(elementId);
            const stateText = String(value).toUpperCase().trim();
            if (stateText === "1" || stateText === "ON" || stateText === "RUNNING") {
                el.innerText = "RUNNING";
                el.className = "badge active";
            } else {
                el.innerText = "IDLE";
                el.className = "badge idle";
            }
        };

        setToggleState('state-w1', data.w1);
        setToggleState('state-w3', data.w3);
        setToggleState('state-w4', data.w4);
        setToggleState('state-w5', data.w5);
        setToggleState('state-p1', data.p1);
        setToggleState('state-p2', data.p2);
    }

    // Auto-refresh every 30 seconds
    fetchLatestTelemetry();
    setInterval(fetchLatestTelemetry, 30000);
</script>
</body>
</html>
