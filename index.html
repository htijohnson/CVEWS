<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVEWS Telemetry Dashboard</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-main: #f0f4f8;
            --text-muted: #9aa8b6;
            --primary: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--primary); }
        .timestamp { color: var(--text-muted); font-size: 0.9rem; }

        /* Dashboard Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* Large Data Numbers */
        .huge-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .unit { font-size: 1.2rem; color: var(--text-muted); font-weight: normal; }

        /* Visual Gauge / Progress Bar Styling */
        .gauge-container {
            background-color: #2d2d34;
            border-radius: 6px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 8px;
        }

        .gauge-bar {
            background-color: var(--primary);
            height: 100%;
            width: 0%; /* Dynamic allocation via JavaScript */
            transition: width 0.5s ease-in-out, background-color 0.3s;
        }

        /* Status Grid Items for Switches (Wells/Pumps) */
        .status-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .status-item {
            background-color: #2d2d34;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.active { background-color: #166534; color: #4ade80; }
        .badge.idle { background-color: #3f3f46; color: #d4d4d8; }
        .badge.tripped { background-color: #991b1b; color: #f87171; }
        .badge.clear { background-color: #166534; color: #4ade80; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>CVEWS Telemetry Node</h1>
            <div id="system-state-badge" class="badge idle" style="display:inline-block; margin-top:5px; font-size:0.9rem;">LOADING SYSTEM STATE...</div>
        </div>
        <div class="timestamp">Last Update: <span id="time-label">--/-- --:--:--</span></div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">Small Tank Level</div>
            <div class="huge-value"><span id="val-tk-sm">0</span> <span class="unit">/ 5000 Gal</span></div>
            <div class="gauge-container">
                <div id="gauge-tk-sm" class="gauge-bar"></div>
            </div>
        </div>

            <div class="card-title">Large Tank Level</div>
            <div class="huge-value"><span id="val-tk-lg">0</span> <span class="unit">/ 15000 Gal</span></div>
            <div class="gauge-container">
                <div id="gauge-tk-lg" class="gauge-bar"></div>
            </div>
        </div>
